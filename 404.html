<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Aquatic Rhythm</title>
<meta name="description" content="The page you tried to open could not be found. Redirecting to Aquatic Rhythm.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://aquaticrhythm.com/">
<meta name="theme-color" content="#041e28">
<script>
/* GitHub Pages SPA redirect: load / then ui.js reads sessionStorage to open the right view.
   Avoids /?p= URLs (blocked in robots.txt) and keeps one HTML shell (index.html). */
(function(){
  var path = (window.location.pathname || '/').replace(/\/$/, '') || '/';
  if(path.indexOf('/articles/') === 0) return;
  var segment = path.replace(/^\//, '').split('/')[0] || '';
  var allowed = { ara:1, rhyssa:1, about:1, privacy:1, terms:1, reading:1 };
  if(segment && allowed[segment]){
    try{ sessionStorage.setItem('ar_spa_initial', segment); }catch(e){}
    window.location.replace('/');
    return;
  }
  window.location.replace('/');
})();
</script>
</head>
<body style="background:#020810"></body>
</html>
